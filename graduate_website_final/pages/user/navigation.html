<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>导航指引 - 智能图书馆导览机器人</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/navigation.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部状态栏 -->
    <header class="status-bar">
        <div class="status-left">
            <span class="wifi-status">
                <i class="fas fa-wifi"></i>
                <span id="wifi-status-text">已连接</span>
            </span>
            <span class="battery-status">
                <i class="fas fa-battery-full"></i>
                <span id="battery-level">100%</span>
            </span>
        </div>
        <div class="status-center">
            <span id="current-time">10:50</span>
        </div>
        <div class="status-right">
            <span class="user-status">
                <i class="fas fa-user"></i>
                <span id="user-name">未登录</span>
            </span>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main id="app">
        <!-- 导航指引页面 -->
        <section id="navigation-page" class="page active">
            <div class="navigation-container">
                <h2><i class="fas fa-map-marked-alt"></i> 图书馆导览地图</h2>
                
                <div class="floor-selector">
                    <h3>选择楼层</h3>
                    <div class="floor-buttons">
                        <button class="floor-btn active" data-floor="1">一楼</button>
                        <button class="floor-btn" data-floor="2">二楼</button>
                        <button class="floor-btn" data-floor="3">三楼</button>
                        <button class="floor-btn" data-floor="4">四楼</button>
                    </div>
                </div>
                
                <div class="library-map">
                    <div class="map-container">
                        <svg width="100%" height="300" viewBox="0 0 800 300" id="library-map-svg">
                            <rect width="800" height="300" fill="#f0f0f0"></rect>
                            <text x="400" y="150" text-anchor="middle" font-size="24" fill="#666">
                                图书馆地图
                            </text>
                        </svg>
                    </div>
                    
                    <div class="map-legend">
                        <div class="legend-item">
                            <div class="legend-color" style="background-color: #FF9800;"></div>
                            <span>书架区域</span>
                        </div>
                    </div>
                </div>
                
                <button class="btn-secondary btn-back" onclick="window.location.href=typeof getBackMenuUrl==='function'?getBackMenuUrl():'main-menu.html'">
                    <i class="fas fa-arrow-left"></i> 返回菜单
                </button>
            </div>
        </section>
    </main>

    <!-- 通知提示框 -->
    <div id="notification" class="notification hidden">
        <div class="notification-content">
            <i class="fas fa-info-circle"></i>
            <span id="notification-message"></span>
        </div>
    </div>

    <!-- 模块化JavaScript文件 -->
    <script src="../../js/app-state.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/notification.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/system.js"></script>
    <script src="../../js/navigation.js"></script>
    <script>
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 更新用户状态显示
            updateUserStatus();
            
            // 初始化导航页面
            initNavigationPage();
            
            // 初始化时间显示
            updateTime();
            setInterval(updateTime, 60000);
        });
    </script>
</body>
</html>
